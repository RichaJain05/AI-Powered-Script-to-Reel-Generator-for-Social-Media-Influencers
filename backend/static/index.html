<!DOCTYPE html>
<html>
<head>
    <title>AI Reel Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    <h2>AI Reel Generator</h2>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">
    <h1>Create Viral Reel Script</h1>

    <textarea id="topic" placeholder="Enter your reel topic..."></textarea>

    <div class="row">
        <select id="platform">
            <option>Instagram</option>
            <option>YouTube Shorts</option>
            <option>TikTok</option>
        </select>

        <select id="tone">
            <option>Informative</option>
            <option>Funny</option>
            <option>Motivational</option>
        </select>

        <select id="duration">
            <option value="30">30 sec</option>
            <option value="60">60 sec</option>
        </select>
    </div>

    <input type="text" id="persona" placeholder="Creator Persona (e.g. Tech Creator)">

    <button id="generateBtn">Generate Script</button>
</div>

<div id="output"></div>

<div id="actions" style="display:none;">
    <button onclick="copyScript()">Copy</button>
    <button onclick="downloadScript()">Download</button>
    <button onclick="generateVideo()" id="generateVideoBtn">Generate Video</button>
</div>

<script src="script.js"></script>

<script>
function logout(){
    window.location.href="login.html";
}
</script>

</body>
</html>
