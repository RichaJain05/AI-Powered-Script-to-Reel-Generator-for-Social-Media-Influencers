<!DOCTYPE html>
<html>
<head>
    <title>Script to Reel Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Script to Reel Generator</h1>
<p>This tool helps convert a simple idea into a reel script.</p>

<button type="button" onclick="logout()">Logout</button>

<div class="container">

    <!-- user enters reel topic -->
    <label>Reel Topic</label><br>
    <textarea id="topic" rows="5" placeholder="Enter your reel topic..."></textarea>
    <br><br>

    <!-- platform selection -->
    <label>Platform:</label><br>
    <select id="platform">
        <option>Instagram</option>
        <option>YouTube Shorts</option>
        <option>TikTok</option>
    </select>
    <br><br>

    <!-- reel tone -->
    <label>Tone:</label><br>
    <select id="tone">
        <option>Informative</option>
        <option>Funny</option>
        <option>Motivational</option>
    </select>
    <br><br>

    <!-- reel duration -->
    <label>Duration:</label><br>
    <select id="duration">
        <option value="30">30 seconds</option>
        <option value="60">60 seconds</option>
    </select>
    <br><br>

    <!-- content persona -->
    <label>Creator Persona:</label><br>
    <input type="text" id="persona" placeholder="Example: Tech Creator">
    <br><br>

    <!-- FIXED BUTTON -->
    <button type="button" onclick="generateScript(event)">Generate Script</button>

</div>

<hr>

<h2>Generated Reel Script</h2>

<div id="output"></div>

<!-- actions -->
<div id="actions" style="margin-top:15px; display:none;">
    <button type="button" onclick="copyScript()">Copy Script</button>
    <button type="button" onclick="downloadScript()">Download Script</button>
</div>

<script src="script.js"></script>

<script>
function logout(){
    window.location.href="login.html";
}
</script>

</body>
</html>
